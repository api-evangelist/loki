aid: loki
name: Loki
description: >-
  Loki is an open source log aggregation system from Grafana Labs designed to
  store and query logs efficiently using labels instead of full-text indexing.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Logging
  - Observability
  - Open Source
  - Grafana
url: >-
